<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Brichaus UI Kit — Example</title>

<!--
  This page opens directly in a browser — no build step, no server, no
  npm install. It loads core.js plus exactly the three component files
  it uses (button, input, score-gauge). Delete either component's
  <script> tag and only that piece of the demo disappears; nothing else
  breaks, because every component depends on core.js alone.
-->
<script src="../core/core.js"></script>
<script src="../components/button.js"></script>
<script src="../components/input.js"></script>
<script src="../components/score-gauge.js"></script>

<!--
  Deliberately included a second time: GHL sometimes duplicates an embed
  across sections of the same page. core.js and every component guard
  their customElements.define() and style injection, so this is a no-op,
  not a crash.
-->
<script src="../core/core.js"></script>

<style>
  /* Page-level styling, not part of the kit. Reads the same --bui-*
     tokens core.js injected onto :root, so the surrounding page and the
     components stay visually consistent automatically. */
  body {
    margin: 0;
    font-family: var(--bui-font-family);
    background: var(--bui-color-bg);
    color: var(--bui-color-text);
  }
  .page {
    max-width: 480px;
    margin: 0 auto;
    padding: var(--bui-space-6) var(--bui-space-4);
  }
  .page__eyebrow {
    font-size: var(--bui-font-size-sm);
    color: var(--bui-color-text-muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin: 0 0 var(--bui-space-1);
  }
  .page__title {
    margin: 0 0 var(--bui-space-5);
    font-size: 1.5rem;
  }
  .quiz-card {
    background: var(--bui-color-surface);
    border: 1px solid var(--bui-color-border);
    border-radius: var(--bui-radius-lg);
    padding: var(--bui-space-5);
    display: flex;
    flex-direction: column;
    gap: var(--bui-space-4);
  }
  .quiz-result {
    display: flex;
    justify-content: center;
    padding-top: var(--bui-space-2);
  }
</style>
</head>
<body>
  <div class="page">
    <p class="page__eyebrow">Brichaus Group — Assessment Preview</p>
    <h1 class="page__title">Portfolio Readiness Check</h1>

    <div class="quiz-card">
      <bui-input
        id="readiness-input"
        label="On a scale of 1–10, how prepared do you feel for your next acquisition?"
        type="number"
        placeholder="e.g. 7"
        hint="Whole numbers, 1 through 10."
      ></bui-input>

      <bui-button id="calc-btn" variant="primary">See my score</bui-button>

      <div class="quiz-result">
        <bui-score-gauge
          id="readiness-gauge"
          value="0"
          max="100"
          label="Readiness Score"
        ></bui-score-gauge>
      </div>
    </div>
  </div>

  <script>
    // Plain DOM wiring — this is what a GHL page's inline <script> block
    // looks like. No framework, no build step.
    var input = document.getElementById('readiness-input');
    var button = document.getElementById('calc-btn');
    var gauge = document.getElementById('readiness-gauge');

    button.addEventListener('bui-click', function () {
      var raw = Number(input.value);
      var clamped = Math.max(1, Math.min(10, raw || 0));
      gauge.value = clamped * 10;
    });
  </script>
</body>
</html>
