# Screen 2 — Property detail (master/detail). Bound to gblProperty.
# Group A (identity) + Group B (n8n scoring/fees) are READ-ONLY.
# Group C (ops) is editable; Save keeps cr55d_managementstatus and the four
# is* bits in sync (the single most important rule — bits already drift live).
#
# CONFIRM-IN-STUDIO choice global names:
#   'Management Status (Properties)'  -> options Managed/Prospect/Pending/Lost
#   'Leasing Fee Rate (Properties)'   -> options '100%'/'50%'/'20%'
# Fix here if IntelliSense shows different display names.
#
# Toggle uses the classic Toggle control (.Value boolean). If you swap to the
# modern Toggle, change .Value -> .Checked in the Save Patch.

Screens:
  scrPropertyDetail:
    Properties:
      Fill: =gblBg
    Children:
      # ---------- Header (read-only) ----------
      - recDetailHeader:
          Control: Rectangle
          Properties:
            X: =0
            Y: =0
            Width: =Parent.Width
            Height: =96
            Fill: =gblSurfaceDark
      - btnBack:
          Control: Button
          Properties:
            Text: ="< Back"
            X: =16
            Y: =16
            Width: =96
            Height: =32
            Fill: =gblSlate
            Color: =gblWhite
            OnSelect: =Navigate(scrProperties, ScreenTransition.None)
      - lblDetailName:
          Control: Label
          Properties:
            X: =128
            Y: =12
            Width: =Parent.Width - 400
            Height: =40
            Text: =gblProperty.new_propertyname
            Color: =gblWhite
            Size: =20
            FontWeight: =FontWeight.Semibold
      - lblDetailSub:
          Control: Label
          Properties:
            X: =128
            Y: =52
            Width: =Parent.Width - 400
            Height: =32
            Color: =gblAccentLight
            Size: =12
            Text: |
              =gblProperty.cr55d_address1 & "  ·  type: " & Coalesce(gblProperty.cr55d_propertytype_rentcast, "—") &
               "  ·  GHL: " & Coalesce(gblProperty.cr55d_ghl_contactid, "—") &
               "  ·  key: " & gblProperty.new_goggleplace_id

      # ---------- Scoring & fee (read-only — Group B, n8n-owned) ----------
      - lblScoringHdr:
          Control: Label
          Properties:
            X: =24
            Y: =112
            Width: =400
            Height: =28
            Text: ="Scoring & fee (read-only)"
            FontWeight: =FontWeight.Semibold
            Color: =gblSurfaceDark
      - lblOI:
          Control: Label
          Properties:
            X: =24
            Y: =144
            Width: =300
            Height: =48
            # Operational intensity ranges ~0–6 live (not 0–100).
            Text: |
              ="Operational intensity: " & Text(gblProperty.cr55d_score_operationalintensity, "0.0")
            Color: =gblSlate
      - lblDrivers:
          Control: Label
          Properties:
            X: =24
            Y: =184
            Width: =520
            Height: =72
            Color: =gblSlate
            Text: |
              ="Maintenance " & Text(gblProperty.cr55d_scoremaintenanceburden, "0.0") &
               "   ·   Turnover " & Text(gblProperty.cr55d_scoreturnoverpressure, "0.0") &
               "   ·   Compliance " & Text(gblProperty.cr55d_scorecomplianceburden, "0.0") &
               "   ·   Tenant friction " & Text(gblProperty.cr55d_tenantfrictionscore, "0.0")
      - lblFees:
          Control: Label
          Properties:
            X: =560
            Y: =144
            Width: =420
            Height: =72
            FontWeight: =FontWeight.Semibold
            Color: =gblSurfaceDark
            # feebase / proposedmgmtfee are PERCENTAGES (~3–7%), not dollars.
            Text: |
              ="Base fee: " & Text(gblProperty.cr55d_feebase, "0.00") & "%" & Char(10) &
               "Proposed mgmt fee: " & Text(gblProperty.cr55d_proposedmgmtfee, "0.00") & "%"

      # ---------- Operations (editable — Group C) ----------
      - lblOpsHdr:
          Control: Label
          Properties:
            X: =24
            Y: =272
            Width: =400
            Height: =28
            Text: ="Operations (editable)"
            FontWeight: =FontWeight.Semibold
            Color: =gblSurfaceDark
      - lblStatusCap:
          Control: Label
          Properties:
            X: =24
            Y: =306
            Width: =200
            Height: =24
            Text: ="Management status"
            Color: =gblSlate
      - drpStatusEdit:
          Control: DropDown
          Properties:
            X: =24
            Y: =332
            Width: =240
            Height: =40
            Items: =["Prospect","Pending","Managed","Lost"]
            Default: |
              =Switch(
                  gblProperty.cr55d_managementstatus,
                  'Management Status (Properties)'.Managed, "Managed",
                  'Management Status (Properties)'.Prospect, "Prospect",
                  'Management Status (Properties)'.Pending, "Pending",
                  'Management Status (Properties)'.Lost, "Lost",
                  "Prospect"
              )
      - lblRateCap:
          Control: Label
          Properties:
            X: =300
            Y: =306
            Width: =200
            Height: =24
            Text: ="Leasing fee rate (%)"
            Color: =gblSlate
      - drpLeasingRate:
          Control: DropDown
          Properties:
            X: =300
            Y: =332
            Width: =160
            Height: =40
            Items: =["100","50","20"]
            Default: |
              =Switch(
                  gblProperty.cr55d_leasingfeerate,
                  'Leasing Fee Rate (Properties)'.'100%', "100",
                  'Leasing Fee Rate (Properties)'.'50%', "50",
                  'Leasing Fee Rate (Properties)'.'20%', "20",
                  "100"
              )
      - togEviction:
          Control: Toggle
          Properties:
            X: =24
            Y: =392
            Width: =220
            Height: =40
            Default: =gblProperty.cr55d_evictioncoverage
      - lblTogEviction:
          Control: Label
          Properties:
            X: =250
            Y: =398
            Width: =260
            Height: =28
            Text: ="Eviction coverage"
            Color: =gblSlate
      - togPet:
          Control: Toggle
          Properties:
            X: =24
            Y: =440
            Width: =220
            Height: =40
            Default: =gblProperty.cr55d_petcoverage
      - lblTogPet:
          Control: Label
          Properties:
            X: =250
            Y: =446
            Width: =260
            Height: =28
            Text: ="Pet coverage"
            Color: =gblSlate
      - togLeasePlacement:
          Control: Toggle
          Properties:
            X: =540
            Y: =392
            Width: =220
            Height: =40
            Default: =gblProperty.cr55d_leaseplacementcoverage
      - lblTogLease:
          Control: Label
          Properties:
            X: =766
            Y: =398
            Width: =260
            Height: =28
            Text: ="Lease placement coverage"
            Color: =gblSlate
      - togInspection:
          Control: Toggle
          Properties:
            X: =540
            Y: =440
            Width: =220
            Height: =40
            Default: =gblProperty.cr55d_annualinspection
      - lblTogInspection:
          Control: Label
          Properties:
            X: =766
            Y: =446
            Width: =260
            Height: =28
            Text: ="Annual inspection"
            Color: =gblSlate
      - lblFeeInputsCap:
          Control: Label
          Properties:
            X: =24
            Y: =496
            Width: =600
            Height: =24
            Text: ="Fee components (manual overrides)"
            Color: =gblSlate
      - txtFeeAdjustment:
          Control: TextInput
          Properties:
            X: =24
            Y: =524
            Width: =150
            Height: =40
            HintText: ="Adjustment"
            Default: =Text(gblProperty.cr55d_feeadjustment)
      - txtFeeEviction:
          Control: TextInput
          Properties:
            X: =184
            Y: =524
            Width: =150
            Height: =40
            HintText: ="Eviction"
            Default: =Text(gblProperty.cr55d_feeeviction)
      - txtFeeInspection:
          Control: TextInput
          Properties:
            X: =344
            Y: =524
            Width: =150
            Height: =40
            HintText: ="Inspection"
            Default: =Text(gblProperty.cr55d_feeinspection)
      - txtFeeLeaseProtect:
          Control: TextInput
          Properties:
            X: =504
            Y: =524
            Width: =150
            Height: =40
            HintText: ="Lease protect"
            Default: =Text(gblProperty.cr55d_feeleaseprotect)
      - txtFeeLeasing:
          Control: TextInput
          Properties:
            X: =664
            Y: =524
            Width: =150
            Height: =40
            HintText: ="Leasing"
            Default: =Text(gblProperty.cr55d_feeleasing)
      - txtFeePetCoverage:
          Control: TextInput
          Properties:
            X: =824
            Y: =524
            Width: =150
            Height: =40
            HintText: ="Pet coverage"
            Default: =Text(gblProperty.cr55d_feepetcoverage)
      - txtNotes:
          Control: TextInput
          Properties:
            X: =24
            Y: =580
            Width: =950
            Height: =96
            Mode: =TextMode.MultiLine
            HintText: ="Staff notes"
            Default: =gblProperty.new_notes

      # ---------- Actions ----------
      - btnSave:
          Control: Button
          Properties:
            Text: ="Save"
            X: =24
            Y: =692
            Width: =160
            Height: =44
            Fill: =gblAccent
            Color: =gblWhite
            OnSelect: |
              =Patch(
                  Properties,
                  gblProperty,
                  {
                      cr55d_managementstatus: Switch(drpStatusEdit.Selected.Value,
                          "Managed",  'Management Status (Properties)'.Managed,
                          "Prospect", 'Management Status (Properties)'.Prospect,
                          "Pending",  'Management Status (Properties)'.Pending,
                          "Lost",     'Management Status (Properties)'.Lost),
                      cr55d_ismanaged:  (drpStatusEdit.Selected.Value = "Managed"),
                      cr55d_isprospect: (drpStatusEdit.Selected.Value = "Prospect"),
                      cr55d_ispending:  (drpStatusEdit.Selected.Value = "Pending"),
                      cr55d_islost:     (drpStatusEdit.Selected.Value = "Lost"),
                      cr55d_leasingfeerate: Switch(drpLeasingRate.Selected.Value,
                          "100", 'Leasing Fee Rate (Properties)'.'100%',
                          "50",  'Leasing Fee Rate (Properties)'.'50%',
                          "20",  'Leasing Fee Rate (Properties)'.'20%'),
                      cr55d_evictioncoverage:      togEviction.Value,
                      cr55d_petcoverage:           togPet.Value,
                      cr55d_leaseplacementcoverage: togLeasePlacement.Value,
                      cr55d_annualinspection:      togInspection.Value,
                      cr55d_feeadjustment:  Value(txtFeeAdjustment.Text),
                      cr55d_feeeviction:    Value(txtFeeEviction.Text),
                      cr55d_feeinspection:  Value(txtFeeInspection.Text),
                      cr55d_feeleaseprotect: Value(txtFeeLeaseProtect.Text),
                      cr55d_feeleasing:     Value(txtFeeLeasing.Text),
                      cr55d_feepetcoverage: Value(txtFeePetCoverage.Text),
                      new_notes: txtNotes.Text
                  }
              );
              Set(gblProperty, LookUp(Properties, new_propertyid = gblProperty.new_propertyid));
              Notify("Saved.", NotificationType.Success)
      - btnMarkLost:
          Control: Button
          Properties:
            Text: ="Mark Lost"
            X: =200
            Y: =692
            Width: =160
            Height: =44
            Fill: =gblDanger
            Color: =gblWhite
            # Never delete; never touch statecode (decoupled from lifecycle live).
            OnSelect: |
              =If(
                  Confirm("Mark this property as Lost?"),
                  Patch(Properties, gblProperty, {
                      cr55d_managementstatus: 'Management Status (Properties)'.Lost,
                      cr55d_islost: true,
                      cr55d_isprospect: false,
                      cr55d_ismanaged: false,
                      cr55d_ispending: false
                  });
                  Set(gblProperty, LookUp(Properties, new_propertyid = gblProperty.new_propertyid));
                  Notify("Marked as Lost.", NotificationType.Success)
              )
      - btnOpenProposal:
          Control: Button
          Properties:
            Text: ="Open public proposal"
            X: =376
            Y: =692
            Width: =220
            Height: =44
            Fill: =gblSlate
            Color: =gblWhite
            OnSelect: =Launch("https://mgmt.brichausgroup.com/residential-management-proposal/?placeId=" & gblProperty.new_goggleplace_id)
